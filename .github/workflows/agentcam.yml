name: agentcam CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['agentcam/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: agentcam

jobs:
  test:
    name: ${{ matrix.check-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            check-name: Agentcam Ubuntu Python 3.11
          - os: ubuntu-latest
            python-version: "3.12"
            check-name: Agentcam Ubuntu Python 3.12
          - os: macos-latest
            python-version: "3.11"
            check-name: Agentcam macOS Python 3.11
          - os: macos-latest
            python-version: "3.12"
            check-name: Agentcam macOS Python 3.12
          - os: windows-latest
            python-version: "3.11"
            check-name: Agentcam Windows Python 3.11
          - os: windows-latest
            python-version: "3.12"
            check-name: Agentcam Windows Python 3.12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install agentcam + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show environment
        run: |
          python --version
          git --version
          agentcam version

      - name: Configure git identity (needed by tmp_git_repo fixture)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global commit.gpgsign false

      - name: Run pytest
        run: python -m pytest -v --maxfail=5
