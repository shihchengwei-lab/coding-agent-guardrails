name: toolkit CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['install.sh', 'install.ps1', 'installer/**', 'templates/**', 'tests/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-posix:
    name: Toolkit POSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/test-install.sh
      - run: python3 tests/toolkit_e2e.py --platform posix

  test-windows:
    name: Toolkit Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - shell: powershell
        run: powershell -ExecutionPolicy Bypass -File tests/test-install.ps1
      - run: python tests/toolkit_e2e.py --platform windows

  result:
    name: Toolkit tests
    if: ${{ always() }}
    needs: [test-posix, test-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Require both platform results
        env:
          POSIX_RESULT: ${{ needs.test-posix.result }}
          WINDOWS_RESULT: ${{ needs.test-windows.result }}
        run: test "$POSIX_RESULT" = success && test "$WINDOWS_RESULT" = success
