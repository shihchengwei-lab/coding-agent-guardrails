name: corridor-ci CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['corridor-ci/**']
  pull_request:

defaults:
  run:
    working-directory: corridor-ci

jobs:
  test:
    name: Corridor tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m unittest discover -s tests -v
