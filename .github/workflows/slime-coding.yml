name: slime-coding CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['slime-coding/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: slime-coding

jobs:
  test:
    name: Slime POSIX
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ../agentcam/src
    steps:
      - uses: actions/checkout@v4

      - name: Show versions
        run: |
          python3 --version
          git --version
          bash --version | head -1

      - name: Syntax-check hook scripts
        run: python3 -c 'import ast; ast.parse(open("bin/patch-cost").read())'

      - name: Lint shell scripts
        run: bash -n tests/test.sh

      - name: Check executable bits
        run: |
          for f in bin/patch-cost tests/test.sh; do
            if [ ! -x "$f" ]; then echo "::error::$f is not executable"; exit 1; fi
          done

      - name: Run hook tests
        run: ./tests/test.sh

      - name: Run trusted check tests
        run: python3 -m unittest tests/test_trusted_checks.py

  test-windows-installer:
    name: Slime Windows
    runs-on: windows-latest
    env:
      PYTHONPATH: ../agentcam/src
    steps:
      - uses: actions/checkout@v4

      - name: Run trusted check tests
        run: python -m unittest tests/test_trusted_checks.py

  result:
    name: Slime tests
    if: ${{ always() }}
    needs: [test, test-windows-installer]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Require both platform results
        env:
          POSIX_RESULT: ${{ needs.test.result }}
          WINDOWS_RESULT: ${{ needs.test-windows-installer.result }}
        run: test "$POSIX_RESULT" = success && test "$WINDOWS_RESULT" = success
