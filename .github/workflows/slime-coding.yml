name: slime-coding CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['slime-coding/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: slime-coding

jobs:
  test:
    name: Slime POSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show versions
        run: |
          python3 --version
          git --version
          bash --version | head -1

      - name: Syntax-check hook scripts
        run: |
          python3 -c 'import ast; ast.parse(open("bin/patch-cost").read())'
          python3 -c 'import ast; ast.parse(open("bin/prune-inject").read())'

      - name: Validate hooks template JSON
        run: python3 -c 'import json; json.load(open("hooks/hooks.template.json"))'

      - name: Lint shell scripts
        run: |
          bash -n install.sh
          bash -n tests/test.sh
          bash -n tests/test-cg-install.sh

      - name: Check executable bits
        run: |
          for f in bin/patch-cost bin/prune-inject install.sh tests/test.sh; do
            if [ ! -x "$f" ]; then echo "::error::$f is not executable"; exit 1; fi
          done

      - name: Run hook tests
        run: ./tests/test.sh

      - name: Run removed --with-cg regression tests
        run: bash tests/test-cg-install.sh

      - name: install.sh smoke test (idempotent)
        run: |
          target="$(mktemp -d)"
          git -C "$target" init -q
          ./install.sh "$target"
          ./install.sh "$target"   # second run must stay idempotent
          python3 - "$target" <<'PY'
          import json, sys
          hooks = json.load(open(sys.argv[1] + "/.claude/settings.json"))["hooks"]
          assert set(hooks) >= {"SessionStart", "UserPromptSubmit", "PreToolUse", "PostToolUse", "Stop"}, hooks
          for event, groups in hooks.items():
              assert len(groups) == 1, f"{event} not idempotent: {len(groups)} groups"
          print("install.sh smoke test OK")
          PY

  test-windows-installer:
    name: Slime Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Windows PowerShell 5.1 on purpose: it is what plain `powershell`
      # resolves to for users, and it lacks ConvertFrom-Json -AsHashtable,
      # which the installer must cope with.
      - name: Run Codex installer tests
        shell: powershell
        run: ./tests/test-codex-install.ps1

  result:
    name: Slime tests
    if: ${{ always() }}
    needs: [test, test-windows-installer]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Require both platform results
        env:
          POSIX_RESULT: ${{ needs.test.result }}
          WINDOWS_RESULT: ${{ needs.test-windows-installer.result }}
        run: test "$POSIX_RESULT" = success && test "$WINDOWS_RESULT" = success
