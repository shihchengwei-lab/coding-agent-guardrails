name: kiss-my-diff CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['kiss-my-diff/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: kiss-my-diff/benchmark

jobs:
  test:
    name: Kiss tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pytest
        run: python -m pip install --upgrade pytest

      - name: Run benchmark harness tests
        run: python -m pytest -q
