name: corridor-ci tag consistency

on:
  push:
    tags: ['corridor-ci-v*']

defaults:
  run:
    working-directory: corridor-ci

jobs:
  tag-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tagged tree must reference its own major tag
        run: |
          major="${GITHUB_REF_NAME%%.*}"
          grep -F "corridor-ci@${major}" README.md
          grep -F "corridor-ci@${major}" examples/workflow.yml
