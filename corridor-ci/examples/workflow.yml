# coding-agent-guardrails:managed corridor-ci-v15.0.0
name: Corridor CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  corridor:
    name: Corridor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shihchengwei-lab/coding-agent-guardrails/corridor-ci@corridor-ci-v15.0.0
        with:
          mode: fail
