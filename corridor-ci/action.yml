name: Corridor CI
description: Require PRs to explain their review boundary before maintainer review.
branding:
  icon: git-pull-request
  color: green

inputs:
  mode:
    description: "fail blocks the check; warn only writes the report."
    required: false
    default: fail
  allow_dependencies:
    description: "Whether dependency manifest changes are allowed."
    required: false
    default: "false"
  comment:
    description: "Upsert the Corridor CI report as a sticky PR comment."
    required: false
    default: "false"
  agentcam_evidence:
    description: >-
      Checkout-relative path of a committed agentcam manifest.redacted.json
      (written by `agentcam export --files`). When present, its recorded
      evidence and capture coverage are appended to the report. Blank,
      placeholder, or false recorded verification claims fail the corridor.
    required: false
    default: ".agentcam/manifest.redacted.json"

runs:
  using: composite
  steps:
    - name: Check PR corridor
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_ALLOW_DEPENDENCIES: ${{ inputs.allow_dependencies }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_AGENTCAM_EVIDENCE: ${{ inputs.agentcam_evidence }}
        GITHUB_TOKEN: ${{ github.token }}
      run: python "$GITHUB_ACTION_PATH/bin/corridor_ci.py"
