name: Corridor CI
description: Validate a state-bound Guardrails review artifact before maintainer review.
branding:
  icon: git-pull-request
  color: green

inputs:
  mode:
    description: "fail blocks the check; warn only writes the report."
    required: false
    default: fail
  comment:
    description: "Upsert the Corridor CI report as a sticky PR comment."
    required: false
    default: "false"
  review_artifact:
    description: "Checkout-relative Guardrails review artifact generated at Stop."
    required: false
    default: ".guardrails/review.json"

runs:
  using: composite
  steps:
    - name: Check PR corridor
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_REVIEW_ARTIFACT: ${{ inputs.review_artifact }}
        GITHUB_TOKEN: ${{ github.token }}
      run: python "$GITHUB_ACTION_PATH/bin/corridor_ci.py"
